{% extends "base.html" %}
{% block title %}模拟面试 - AI求职助手{% endblock %}
{% block content %}
<div class="page-container" style="max-width:800px;">
    <div class="page-header">
        <h1 class="gradient-text">模拟面试</h1>
        <p>AI智能模拟真实面试场景，一问一答助您提升面试技巧</p>
    </div>

    <!-- 面试准备区 -->
    <div class="glass-card card-section" id="setupArea">
        <h2 style="margin-bottom:1.5rem;">开始模拟面试</h2>
        
        <div style="margin-bottom:1.5rem;">
            <label class="form-label">目标岗位</label>
            <input id="targetRole" class="form-input" placeholder="例如：前端开发工程师、Java后端、产品经理..." style="font-size:1.1rem;padding:0.875rem 1rem;">
        </div>
        
        <div style="display:flex;gap:1rem;">
            <button class="btn btn-primary" id="startBtn" onclick="startInterview()" style="background:linear-gradient(135deg,#4f46e5,#3b82f6);box-shadow:0 4px 12px rgba(79,70,229,0.3);padding:0.875rem 2rem;font-size:1rem;">
                🎯 开始面试
            </button>
        </div>
    </div>

    <!-- 面试对话区 -->
    <div id="interviewArea" style="display:none;">
        <div class="glass-card" style="margin-bottom:1rem;">
            <div style="display:flex;justify-content:space-between;align-items:center;padding:1rem 1.5rem;background:linear-gradient(135deg,#4f46e5,#3b82f6);border-radius:12px;color:white;">
                <div>
                    <strong id="currentRole">面试进行中</strong>
                    <div style="font-size:0.85rem;opacity:0.8;margin-top:0.25rem;">第 <span id="questionNum">1</span> 题</div>
                </div>
                <button class="btn" onclick="endInterview()" style="background:rgba(255,255,255,0.2);color:white;border:none;padding:0.5rem 1rem;border-radius:8px;">
                    结束面试
                </button>
            </div>
        </div>
        
        <!-- 聊天记录 -->
        <div id="chatArea" class="glass-card" style="max-height:450px;overflow-y:auto;padding:1.5rem;margin-bottom:1rem;">
            <!-- 消息将动态插入 -->
        </div>
        
        <!-- 输入区 -->
        <div class="glass-card" style="padding:1.25rem;">
            <div style="display:flex;gap:0.75rem;">
                <textarea id="answerInput" class="form-input" placeholder="输入您的回答，按回车提交..." style="flex:1;resize:none;min-height:60px;" onkeypress="handleKeyPress(event)"></textarea>
                <button class="btn btn-primary" onclick="submitAnswer()" style="background:linear-gradient(135deg,#4f46e5,#3b82f6);padding:0.75rem 1.5rem;align-self:flex-end;">
                    发送
                </button>
            </div>
        </div>
    </div>
    
    <!-- 面试结果 -->
    <div id="resultArea" style="display:none;">
        <div class="glass-card card-section">
            <h2><span class="step-badge" style="background:#10b981;color:white;">✅</span> 面试结束</h2>
            <div id="finalFeedback" class="result-content"></div>
            <div style="margin-top:1.5rem;display:flex;gap:1rem;">
                <button class="btn btn-primary" onclick="restartInterview()" style="background:linear-gradient(135deg,#4f46e5,#3b82f6);">再来一次</button>
                <button class="btn btn-outline" onclick="window.location.href='/'">返回首页</button>
            </div>
        </div>
    </div>
</div>

<script>
// 全局状态
let systemPrompt = '';
let conversationHistory = [];
let questionCount = 0;

async function startInterview() {
    const role = document.getElementById('targetRole').value.trim();
    if (!role) {
        alert('请输入目标岗位');
        return;
    }
    
    const btn = document.getElementById('startBtn');
    btn.disabled = true;
    btn.innerHTML = '正在准备面试...';
    
    try {
        const res = await fetch('/api/interview-start', {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify({
                target_role: role
            })
        });
        
        const data = await res.json();
        
        if (data.error) {
            alert('启动面试失败: ' + data.error);
            btn.disabled = false;
            btn.innerHTML = '🎯 开始面试';
            return;
        }
        
        // 初始化对话状态
        systemPrompt = data.system_prompt;
        conversationHistory = [];
        questionCount = 1;
        
        // 显示面试区域
        document.getElementById('setupArea').style.display = 'none';
        document.getElementById('interviewArea').style.display = 'block';
        document.getElementById('currentRole').textContent = role;
        document.getElementById('questionNum').textContent = '1';
        document.getElementById('chatArea').innerHTML = '';
        
        // 添加面试官的第一句话
        addMessage('interviewer', data.first_question);
        conversationHistory.push({"role": "assistant", "content": data.first_question});
        
        document.getElementById('answerInput').focus();
        
    } catch (e) {
        alert('请求失败: ' + e.message);
        btn.disabled = false;
        btn.innerHTML = '🎯 开始面试';
    }
}

function addMessage(sender, content) {
    const chatArea = document.getElementById('chatArea');
    const msgDiv = document.createElement('div');
    msgDiv.style.cssText = `
        display: flex;
        flex-direction: column;
        margin-bottom: 1.25rem;
        ${sender === 'user' ? 'align-items: flex-end;' : 'align-items: flex-start;'}
    `;
    
    const bubbleColor = sender === 'user' 
        ? 'background:linear-gradient(135deg,#4f46e5,#3b82f6);color:white;border-radius:16px 16px 4px 16px;'
        : 'background:#f3f4f6;color:#1f2937;border-radius:16px 16px 16px 4px;';
    
    msgDiv.innerHTML = `
        <div style="max-width:90%;padding:0.875rem 1.25rem;${bubbleColor}">
            <div style="font-size:0.8rem;margin-bottom:0.25rem;opacity:0.7;">
                ${sender === 'user' ? '👤 您的回答' : '🎤 面试官'}
            </div>
            <div style="line-height:1.6;white-space:pre-wrap;">${escapeHtml(content)}</div>
        </div>
    `;
    
    chatArea.appendChild(msgDiv);
    chatArea.scrollTop = chatArea.scrollHeight;
}

function escapeHtml(text) {
    const div = document.createElement('div');
    div.textContent = text;
    return div.innerHTML;
}

async function submitAnswer() {
    const input = document.getElementById('answerInput');
    const answer = input.value.trim();
    
    if (!answer) return;
    
    // 添加用户回答到聊天
    addMessage('user', answer);
    input.value = '';
    
    // 添加到历史
    conversationHistory.push({"role": "user", "content": answer});
    
    // 显示等待状态
    const chatArea = document.getElementById('chatArea');
    const loadingDiv = document.createElement('div');
    loadingDiv.id = 'loadingMsg';
    loadingDiv.style.cssText = 'display:flex;align-items:center;gap:0.5rem;margin-bottom:1rem;color:#6b7280;';
    loadingDiv.innerHTML = '<span>面试官正在思考...</span><div class="spinner" style="width:16px;height:16px;border-width:2px;"></div>';
    chatArea.appendChild(loadingDiv);
    chatArea.scrollTop = chatArea.scrollHeight;
    
    try {
        const res = await fetch('/api/interview-chat', {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify({
                system_prompt: systemPrompt,
                user_message: '',
                conversation_history: conversationHistory,
                target_role: document.getElementById('currentRole').textContent
            })
        });
        
        const data = await res.json();
        document.getElementById('loadingMsg')?.remove();
        
        if (data.error) {
            addMessage('interviewer', '抱歉，服务出现了一些问题：' + data.error);
        } else {
            addMessage('interviewer', data.result);
            conversationHistory.push({"role": "assistant", "content": data.result});
            questionCount++;
            document.getElementById('questionNum').textContent = questionCount;
        }
        
    } catch (e) {
        document.getElementById('loadingMsg')?.remove();
        addMessage('interviewer', '请求失败: ' + e.message);
    }
}

function handleKeyPress(e) {
    if (e.key === 'Enter' && !e.shiftKey) {
        e.preventDefault();
        submitAnswer();
    }
}

async function endInterview() {
    if (!confirm('确定要结束面试吗？')) return;
    await showInterviewResult();
}

async function showInterviewResult() {
    // 添加面试结束请求
    const endPrompt = "面试到此结束，请对我的表现进行点评和评价，包括优点、不足和建议。";
    
    conversationHistory.push({"role": "user", "content": endPrompt});
    
    document.getElementById('interviewArea').style.display = 'none';
    document.getElementById('resultArea').style.display = 'block';
    
    const feedbackDiv = document.getElementById('finalFeedback');
    feedbackDiv.innerHTML = '<div style="display:flex;align-items:center;gap:0.75rem;padding:2rem;color:#6b7280;"><div class="spinner" style="border-color:rgba(79,70,229,0.2);border-top-color:#4f46e5;"></div><span>正在生成面试评价...</span></div>';
    
    try {
        const res = await fetch('/api/interview-chat', {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify({
                system_prompt: systemPrompt,
                user_message: '',
                conversation_history: conversationHistory,
                target_role: document.getElementById('currentRole').textContent
            })
        });
        
        const data = await res.json();
        
        if (data.error) {
            feedbackDiv.innerHTML = `<p style="color:#ef4444;">评价生成失败: ${data.error}</p>`;
        } else {
            feedbackDiv.innerHTML = `<div style="line-height:1.8;padding:1rem;background:#f9fafb;border-radius:8px;">${escapeHtml(data.result)}</div>`;
        }
    } catch (e) {
        feedbackDiv.innerHTML = `<p style="color:#ef4444;">评价生成失败: ${e.message}</p>`;
    }
}

function restartInterview() {
    document.getElementById('setupArea').style.display = 'block';
    document.getElementById('interviewArea').style.display = 'none';
    document.getElementById('resultArea').style.display = 'none';
    document.getElementById('startBtn').disabled = false;
    document.getElementById('startBtn').innerHTML = '🎯 开始面试';
    document.getElementById('targetRole').value = '';
    systemPrompt = '';
    conversationHistory = [];
    questionCount = 0;
}
</script>
{% endblock %}
